<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WorldCup Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>⚽ WorldCup Hub</h1>

<!-- 🌍 LANGUAGE -->
<select id="languageSwitcher">
  <option value="en">English</option>
  <option value="ar">العربية</option>
  <option value="fr">Français</option>
</select>

<!-- LOGIN -->
<button id="loginBtn">🔐 Login with Pi</button>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <h2>Welcome, <span id="username"></span></h2>
  <button id="logoutBtn">Logout</button>

  <!-- 🎁 DAILY REWARD -->
  <button id="dailyBtn">🎁 Daily Reward</button>

  <!-- MATCHES -->
  <h3>📅 Matches</h3>
  <ul id="matches"></ul>

  <!-- PREDICTION -->
  <h3>🧠 Match Prediction</h3>
  <button onclick="predict('Argentina')">Argentina</button>
  <button onclick="predict('Brazil')">Brazil</button>
  <p id="result"></p>

  <!-- LEADERBOARD -->
  <h3>🏆 Leaderboard</h3>
  <ul id="leaderboard">
    <li>You - 0 pts</li>
  </ul>

  <!-- STAKING -->
  <h3>📈 Fan Staking</h3>
  <input type="number" id="stakeAmount" placeholder="Stake Points">
  <button id="stakeBtn">Stake</button>
  <p id="stakeStatus"></p>

  <!-- COMMENTS -->
  <h3>💬 Comments</h3>
  <textarea id="commentInput"></textarea><br>
  <button onclick="addComment()">Post</button>
  <ul id="comments"></ul>

  <!-- 💰 PAYMENT (UNCHANGED) -->
  <h3>💰 Premium</h3>
  <button id="premiumBtn">Unlock Premium (0.5π)</button>

  <!-- 📢 ADS -->
  <h3>📢 Sponsored</h3>
  <div id="adBox" style="border:1px solid #ccc; padding:10px;"></div>

  <!-- 📜 TRANSACTION HISTORY -->
  <h3>📜 Transactions</h3>
  <button id="clearTxBtn">Clear History</button>
  <ul id="txList"></ul>

</div>

<p id="status">Open in Pi Browser</p>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="script.js"></script>

</body>
</html>
